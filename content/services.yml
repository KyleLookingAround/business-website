#  VIADUCT STUDIOS · services page
#
#  No prices here on purpose — every project is quoted individually. The
#  packages describe *ways to work*; the number comes after a quick chat.
# ════════════════════════════════════════════════════════════════════

intro: "Three ways to work with us — plainly described. Every site is handmade, loads fast, and comes with an editor so you can change your own words and photos. No lock-in: the site and the domain are yours."

packages:
  - name: "The Arch"
    kind: "A single-page site"
    blurb: "One beautiful page that says who you are, where you are, and when you're open. Perfect for getting on the map properly."
    includes:
      - "One handmade page, designed around your place"
      - "Opening hours, map, contact — the essentials done right"
      - "Your own domain set up, in your name"
      - "Live in about a week"
  - name: "The Span"
    kind: "The full site, self-editable"
    blurb: "A proper multi-page site with an editor behind it — menus, gigs, photos, whatever changes in your world, you change yourself."
    includes:
      - "Up to six pages, designed around your business"
      - "An editor for every word and photo — update from your phone"
      - "A safety net: a broken edit can never take the site down"
      - "Search-engine plumbing done properly (maps, previews, sitemaps)"
      - "Something distinctive nobody else has — ask about the 3D mug"
  - name: "The Keystone"
    kind: "Care plan · monthly"
    blurb: "We keep the site fast, secure and current — and handle the small changes you'd rather not do yourself. Cancel any time; the site stays yours."
    includes:
      - "Hosting, domain renewals and updates handled"
      - "Small content changes done for you, usually same-day"
      - "A yearly refresh conversation — keep it feeling current"
      - "Straight answers when you're deciding what's next"

note: "No price list — every job is different, so every job is quoted for what it actually is. Tell us about your place and you'll get a real number and an honest steer, not a call-booking link."
