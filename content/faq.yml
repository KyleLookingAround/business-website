#  VIADUCT STUDIOS · frequently asked questions
#  Shown on the Services page and used for Google's FAQ rich results.
# ════════════════════════════════════════════════════════════════════

items:
  - q: "Do I own the site?"
    a: "Yes — completely. The site and the domain are registered in your name, and everything lives in a repository you own. There's no platform you're renting and no way for us to hold it hostage. If you ever want to take it elsewhere, you can."
  - q: "What does it cost?"
    a: "There's no price list, because every job is different — a one-page site and a six-page self-editable one aren't the same work. Tell us what you need and you'll get a real, honest number quickly, plus a straight steer on what you do and don't need."
  - q: "How long does it take?"
    a: "A single page can be live in about a week. A full multi-page site is usually a couple of weeks, depending on how ready your words and photos are. We'll give you a realistic date up front."
  - q: "Can I really update it myself?"
    a: "Yes — that's the whole point. You get a simple editor with a Save button; change your menu, add an event, swap a photo, all from your phone. No code, no developer, no waiting on us."
  - q: "What if I break something?"
    a: "You can't take the site down. Every edit is checked automatically before it goes live — if something's off, the live site stays exactly as it was and you get a friendly heads-up to fix the edit. It's a safety net you don't have to think about."
  - q: "What if I'd rather not do it myself?"
    a: "That's fine too. The care plan covers small changes done for you, usually same-day, plus hosting and updates handled. Some people love editing their own site; some would rather ring us. Both work."
